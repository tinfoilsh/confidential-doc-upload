cvm-version: 0.8.1
cpus: 8
memory: 16384

containers:
  - name: "doc-upload"
    image: "ghcr.io/tinfoilsh/confidential-doc-upload@sha256:f24f8f6df00c608e360be0ed73b14a0d3369015294972489caa18e4a1be2f4aa" # v0.0.31
    restart: always
    cap_add:
      - SYS_ADMIN
    env:
      - VLM_MODEL: "gemma4-31b"
      - SIDECAR_URL: "http://localhost:5002"
      - ROUTER_PORT: "5000"
      - MAX_PARALLEL: "32"
    secrets:
      - TINFOIL_API_KEY
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      start_period: 5m

shim:
  upstream-port: 5000
  authenticated: true
  authenticated-endpoints:
    - /v1/convert/file
  paths:
    - /health
    - /metrics
    - /v1/convert/file
