cvm-version: 0.7.5
cpus: 8
memory: 16384

containers:
  - name: "doc-upload"
    image: "ghcr.io/tinfoilsh/confidential-doc-upload@sha256:abdac072274712f82c34931f5f549736e86f56264c65727f8d3486791f393bdb" # v0.0.29
    cap_add:
      - SYS_ADMIN
    env:
      - VLM_MODEL: "gemma4-31b"
      - SIDECAR_URL: "http://localhost:5002"
      - ROUTER_PORT: "5000"
      - MAX_PARALLEL: "32"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 5000
  authenticated: true
  authenticated-endpoints:
    - /v1/convert/file
  paths:
    - /health
    - /metrics
    - /v1/convert/file
