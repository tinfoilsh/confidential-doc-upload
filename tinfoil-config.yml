cvm-version: 0.7.3
cpus: 16
memory: 65536

containers:
  - name: "doc-upload"
    image: "ghcr.io/docling-project/docling-serve-cu130:v1.13.1@sha256:df1884e71573e36401eaedff6abbec875e026e522ac0e0e9854c77ee036e4df6"
    runtime: nvidia
    gpus: all

shim:
  upstream-port: 5001
  authenticated: true
  authenticated-endpoints:
    - /v1/convert/file
  paths:
    - /health
    - /v1/convert/file
