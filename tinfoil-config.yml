cvm-version: 0.7.3
memory: 65536
cpus: 16
gpus: 1

containers:
  - name: "doc-upload"
    image: "ghcr.io/docling-project/docling-serve-cu128:v1.8.0@sha256:ed9747dc6b6c794edd9a7e4087151a8bcc8cea29ad066851a541880760de2650"
    args:
      - "--gpus all"

shim:
  upstream-port: 5001
  authenticated: true
  authenticated-endpoints:
    - /v1/convert/file
  paths:
    - /health
    - /v1/convert/file
