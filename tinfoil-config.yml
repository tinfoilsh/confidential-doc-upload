cvm-version: 0.7.5
cpus: 8
memory: 16384

containers:
  - name: "doc-upload"
    image: "ghcr.io/tinfoilsh/confidential-doc-upload@sha256:5f54fa537ae3970baf39e8c0fcf9ef6869853a057d422c85d32c6de940f24693" # v0.0.28
    cap_add:
      - SYS_ADMIN
    env:
      - VLM_MODEL: "gemma4-31b"
      - SIDECAR_URL: "http://localhost:5002"
      - ROUTER_PORT: "5000"
      - MAX_PARALLEL: "32"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 5000
  authenticated: true
  authenticated-endpoints:
    - /v1/convert/file
  paths:
    - /health
    - /metrics
    - /v1/convert/file
