cvm-version: 0.7.5
cpus: 4
memory: 8192

containers:
  - name: "doc-upload"
    image: "ghcr.io/tinfoilsh/confidential-doc-upload@sha256:e793e50662b8687349601435d3751133f9b8fe58ee91ce7c4a64331134ca64ed" # v0.0.25
    env:
      - VLM_MODEL: "gemma4-31b"
      - SIDECAR_URL: "http://localhost:5002"
      - ROUTER_PORT: "5000"
      - MAX_PARALLEL: "32"
    secrets:
      - TINFOIL_API_KEY

shim:
  upstream-port: 5000
  authenticated: true
  authenticated-endpoints:
    - /v1/convert/file
  paths:
    - /health
    - /metrics
    - /v1/convert/file
